{% extends 'base.html' %}

{% block content %}

<h1>CREAR PEDIDO</h1>

<form action="{{ url_for('bp_pedidos.create') }}" method="POST">

    <div class="mb-3">
        <label for="cliente_id" class="form-label">Cliente</label>
        <select class="form-select" name="cliente_id" required>
            <option value="" disabled selected>Seleccione un cliente</option>
            {% for cliente in clientes %}
            <option value="{{ cliente.id }}">{{ cliente.nombre }} - {{ cliente.telefono }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label for="producto_id" class="form-label">Producto</label>
        <select class="form-select" name="producto_id" required>
            <option value="" disabled selected>Seleccione un producto</option>
            {% for producto in productos %}
            <option value="{{ producto.id }}">{{ producto.nombre }} - Precio: Bs {{ "%.2f"|format(producto.precio) }} | Stock: {{ producto.stock }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label for="" class="form-label">Monto (Bs)</label>
        <input type="number" step="0.01" class="form-control" placeholder="0.00" name="monto" required>
    </div>

    <button type="submit" class="btn btn-primary">Registrar pedido</button>
    <a class="btn btn-secondary" href="{{ url_for('bp_pedidos.index') }}">Cancelar</a>

</form>

{% endblock %}
