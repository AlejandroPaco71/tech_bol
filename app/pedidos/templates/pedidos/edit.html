{% extends 'base.html' %}

{% block content %}

<h1>Actualizar Pedido</h1>

<form action="{{ url_for('bp_pedidos.edit', id=pedido.id) }}" method="POST">

    <div class="mb-3">
        <label for="cliente_id" class="form-label">Cliente</label>
        <select class="form-select" name="cliente_id" required>
            {% for cliente in clientes %}
            <option value="{{ cliente.id }}" {% if cliente.id == pedido.cliente_id %}selected{% endif %}>
                {{ cliente.nombre }} - {{ cliente.telefono }}
            </option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label for="producto_id" class="form-label">Producto</label>
        <select class="form-select" name="producto_id" required>
            {% for producto in productos %}
            <option value="{{ producto.id }}" {% if producto.id == pedido.producto_id %}selected{% endif %}>
                {{ producto.nombre }} - Precio: Bs {{ "%.2f"|format(producto.precio) }} | Stock: {{ producto.stock }}
            </option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label for="" class="form-label">Monto (Bs)</label>
        <input type="number" step="0.01" class="form-control" value="{{ pedido.monto }}" name="monto" required>
    </div>



    <button type="submit" class="btn btn-primary">Actualizar pedido</button>
    <a class="btn btn-secondary" href="{{ url_for('bp_pedidos.index') }}">Cancelar</a>
</form>

{% endblock %}
