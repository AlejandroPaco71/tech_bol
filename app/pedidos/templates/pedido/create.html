{% extends 'base.html' %}

{% block content %}

<h1>CREAR MIEMBRO </h1>

<form action="{{ url_for('bp_miembro.create') }}" method="POST">



    <div class="mb-3">
        <label for="" class="form-label">Nombre</label>
        <input type="text" class="form-control" placeholder="Nombres" name="nombre" required>
    </div>

    <div class="mb-3">
        <label for="" class="form-label">Correo</label>
        <input type="email" class="form-control" placeholder="Correo" name="email" required>
    </div>

    <button type="submit" class="btn btn-primary">Registrar miembro</button>
    <a class="btn btn-secondary" href="{{ url_for('bp_miembro.index' )}}">Cancelar</a>

</form>

{% endblock %}
