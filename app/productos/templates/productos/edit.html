{% extends 'base.html' %}

{% block content %}

<h1>Actualizar Producto</h1>

<form action="{{ url_for('bp_productos.edit', id=producto.id) }}" method="POST">
    <div class="mb-3">
        <label for="" class="form-label">Nombre del producto</label>
        <input type="text" class="form-control" value="{{ producto.nombre }}" name="nombre" required>
    </div>

    <div class="mb-3">
        <label for="" class="form-label">Precio (Bs)</label>
        <input type="number" step="0.01" class="form-control" value="{{ producto.precio }}" name="precio" required>
    </div>

    <div class="mb-3">
        <label for="" class="form-label">Stock</label>
        <input type="number" step="1" class="form-control" value="{{ producto.stock }}" name="stock" required>
    </div>

    <button type="submit" class="btn btn-primary">Actualizar producto</button>
    <a class="btn btn-secondary" href="{{ url_for('bp_productos.index') }}">Cancelar</a>
</form>

{% endblock %}
