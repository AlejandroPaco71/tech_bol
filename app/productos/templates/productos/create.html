{% extends 'base.html' %}

{% block content %}

<h1>CREAR PRODUCTO</h1>

<form action="{{ url_for('bp_productos.create') }}" method="POST">

    <div class="mb-3">
        <label for="" class="form-label">Nombre del producto</label>
        <input type="text" class="form-control" placeholder="Ej. Laptop, Camisa, etc." name="nombre" required>
    </div>

    <div class="mb-3">
        <label for="" class="form-label">Precio (Bs)</label>
        <input type="number" step="0.01" class="form-control" placeholder="0.00" name="precio" required>
    </div>

    <div class="mb-3">
        <label for="" class="form-label">Stock</label>
        <input type="number" step="1" class="form-control" placeholder="Cantidad disponible" name="stock" required>
    </div>

    <button type="submit" class="btn btn-primary">Registrar producto</button>
    <a class="btn btn-secondary" href="{{ url_for('bp_productos.index') }}">Cancelar</a>

</form>

{% endblock %}
