{% extends 'base.html' %}


{% block content %}

<h1>Actualizar Miembro</h1>

<form action="{{ url_for('bp_miembro.edit', id=miembro.id) }}" method="POST">
    <div class="mb-3">
        <label for="" class="form-label">Nombre</label>
        <input type="text" class="form-control" value="{{ miembro.nombre }}" name="nombre" required>
    </div>

    <div class="mb-3">
        <label for="" class="form-label">Correo</label>
        <input type="email" class="form-control" value="{{ miembro.email }}" name="email" required>
    </div>

    <button type="submit" class="btn btn-primary">Registrar miembro</button>
    <a class="btn btn-secondary" href="{{ url_for('bp_miembro.index' )}}">Cancelar</a>
</form>

{% endblock %}
